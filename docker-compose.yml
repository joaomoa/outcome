services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rfq
      POSTGRES_PASSWORD: rfq
      POSTGRES_DB: rfq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq -d rfq"]
      interval: 2s
      timeout: 5s
      retries: 10
